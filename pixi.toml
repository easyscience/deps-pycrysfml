[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64", "linux-64"]

[dependencies]
#python = "3.12.*"
python = "3.13.*"

[pypi-dependencies]
pip = '*'
#pycrysfml = { path = '.', editable = true, extras = ['ci', 'test'] }
pycrysfml = { version = ">=0.2.1", extras = ['ci', 'test'], index = "https://easyscience.github.io/pypi/" }

[system-requirements]
macos = "14.0"

[tasks]
scripts = "python pybuild.py --create-scripts --enable-backslash-escapes"
build = "scripts/main.sh"
benchmark = "scripts/run_pycfml_functional_tests_with_benchmarks_save.sh"
