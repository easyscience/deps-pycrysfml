[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64", "linux-64"]

[dependencies]
#python = "3.12.*"
python = "3.14.*"

[system-requirements]
macos = "14.0"

[feature.dev.pypi-dependencies]
pip = '*'
pycrysfml = { path = '.', editable = true, extras = ['ci', 'test'] }

[feature.wheeltest.pypi-dependencies]
pip = '*'
pytest = '*'
pytest-benchmark = '*'
deepdiff = '*'
matplotlib = '*'

[environments]
default = ["dev"]
wheeltest = ["wheeltest"]

[tasks]
scripts = { cmd = "python pybuild.py --create-scripts --enable-backslash-escapes", description = "Generate build and test shell scripts in the dev environment" }
scripts-fresh = { cmd = "python pybuild.py --create-scripts --enable-backslash-escapes --force-download-cfml-repo", description = "Generate scripts for a maintainer CFML refresh from the configured branch" }
build = { cmd = "scripts/main.sh", description = "Run the full local build and test pipeline in the dev environment" }
benchmark = { cmd = "scripts/run_pycfml_functional_tests_with_benchmarks_save.sh", description = "Save local benchmark results in the dev environment" }

[tasks.cfml-refresh]
cmd = "python pybuild.py --create-scripts --enable-backslash-escapes --force-download-cfml-repo && scripts/create_cfml_repo_dir.sh && scripts/download_cfml_repo.sh"
description = "Refresh vendored CFML from the branch configured in pybuild.toml"

[tasks.cfml-refresh-branch]
cmd = "python pybuild.py --create-scripts --enable-backslash-escapes --force-download-cfml-repo --cfml-branch {{ branch }} && scripts/create_cfml_repo_dir.sh && scripts/download_cfml_repo.sh"
args = [{ arg = "branch", default = "master" }]
description = "Refresh vendored CFML from a specific branch"

[tasks.cfml-refresh-commit]
cmd = "python pybuild.py --create-scripts --enable-backslash-escapes --force-download-cfml-repo --cfml-branch {{ branch }} --cfml-commit {{ commit }} && scripts/create_cfml_repo_dir.sh && scripts/download_cfml_repo.sh"
args = ["commit", { arg = "branch", default = "master" }]
description = "Refresh vendored CFML from a specific commit"

[tasks.wheel-build]
cmd = '''
{% if pixi.is_osx %}export SDKROOT="${SDKROOT:-$(xcrun --show-sdk-path 2>/dev/null || true)}" &&
export MACOSX_DEPLOYMENT_TARGET="${MACOSX_DEPLOYMENT_TARGET:-$(sw_vers -productVersion | sed 's/\..*/.0/')}" &&
{% endif %}
scripts/print_build_variables.sh &&
scripts/create_cfml_repo_dir.sh &&
scripts/create_cfml_build_dir.sh &&
scripts/create_cfml_dist_dir.sh &&
scripts/create_pycfml_src_dir.sh &&
scripts/create_pycfml_build_dir.sh &&
scripts/create_pycfml_dist_dir.sh &&
scripts/download_cfml_repo.sh &&
scripts/rename_global_deps_file.sh &&
scripts/build_cfml_modules_obj.sh &&
scripts/delete_renamed_global_deps_file.sh &&
scripts/build_cfml_static_lib.sh &&
scripts/move_built_to_cfml_dist.sh &&
scripts/build_cfml_test_programs.sh &&
scripts/create_pycfml_src.sh &&
scripts/build_pycfml_modules_obj.sh &&
scripts/build_pycfml_lib_obj.sh &&
scripts/build_pycfml_shared_obj_or_dynamic_lib.sh &&
scripts/copy_built_to_pycfml_dist.sh &&
scripts/change_runpath_for_built_pycfml.sh &&
scripts/copy_extra_libs_to_pycfml_dist.sh &&
scripts/copy_py_api_files_to_pycfml_dist.sh &&
scripts/copy_init_file_to_pycfml_dist.sh &&
scripts/copy_cfml_databases_to_pycfml_dist.sh &&
scripts/validate_pyproject_toml.sh &&
scripts/create_pycfml_python_wheel.sh &&
scripts/rename_pycfml_python_wheel.sh &&
scripts/detect_abi3_violations.sh &&
scripts/check_wheel_contents.sh
'''
depends-on = ["scripts"]
description = "Build and validate the local wheel without installing it"

[tasks._wheel-smoke]
cmd = 'scripts/install_pycfml_from_wheel.sh && python -c "import pycrysfml; from pycrysfml import cfml_py_utilities"'
default-environment = "wheeltest"
description = "Install the built wheel in the clean wheeltest environment and smoke-test imports"

[tasks._wheel-import-test]
cmd = 'scripts/install_pycfml_from_wheel.sh && pytest tests/unit_tests/pyCFML/import/test__import.py --color=yes --benchmark-disable'
default-environment = "wheeltest"
description = "Install the built wheel in the clean wheeltest environment and run the import unit test"

[tasks.wheel-smoke]
depends-on = [
	{ task = "wheel-build", environment = "default" },
	{ task = "_wheel-smoke", environment = "wheeltest" },
]
description = "Build the wheel in the dev environment and smoke-test imports in the clean wheeltest environment"

[tasks.wheel-import-test]
depends-on = [
	{ task = "wheel-build", environment = "default" },
	{ task = "_wheel-import-test", environment = "wheeltest" },
]
description = "Build the wheel in the dev environment and run the import unit test in the clean wheeltest environment"
