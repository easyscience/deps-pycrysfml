name: release-build-and-test

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - "**"
  #schedule:
  #  - cron: '*/120 8-18 * * *'  # every 2 hours from 8:00 to 18:00 every day

env:
  WHEEL_DIR: dist/pyCFML/wheel

jobs:

  ##############################################################################
  # JOB 0
  ##############################################################################
  resolve_release_tag:

    runs-on: ubuntu-latest

    outputs:
      tag_name: ${{ steps.export.outputs.tag_name }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history with tags is required for versioningit

      - name: Setup easyscience[bot]
        if: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
        id: bot
        uses: ./.github/actions/setup-easyscience-bot
        with:
          app-id: ${{ vars.EASYSCIENCE_APP_ID }}
          private-key: ${{ secrets.EASYSCIENCE_APP_KEY }}

      - name: Draft the next release tag
        if: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
        id: draft
        uses: enhantica/drafterino@v2
        with:
          config: |
            title: 'crysfml $COMPUTED_VERSION'
            tag: 'v$COMPUTED_VERSION'
            note-template: '- $PR_TITLE (#$PR_NUMBER)'

            default-bump: post

            major-bump-labels: ['[scope] significant']
            minor-bump-labels: ['[scope] enhancement']
            patch-bump-labels: ['[scope] bug', '[scope] maintenance']
            post-bump-labels: ['[scope] documentation']

            release-notes:
              - title: 'Added'
                labels: ['[scope] significant', '[scope] enhancement']
              - title: 'Fixed'
                labels: ['[scope] bug']
              - title: 'Changed'
                labels: ['[scope] maintenance', '[scope] documentation']
        env:
          GITHUB_TOKEN: ${{ steps.bot.outputs.token }}

      - name: Export release tag
        id: export
        shell: bash
        run: echo "tag_name=${{ steps.draft.outputs.tag_name }}" >> "$GITHUB_OUTPUT"

  ##############################################################################
  # JOB 1
  ##############################################################################
  build:  # current job name

    needs: resolve_release_tag

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, windows-2022, macos-14]
        python-version: ['3.11', '3.12', '3.13', '3.14']
        toolchain:
          - { exe: gfortran, compiler: gcc, version: 13 }

    runs-on: ${{ matrix.os }}

    steps: # job steps
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history with tags is required for versioningit

      - name: Create local release tag for exact-version wheel builds
        if: ${{ needs.resolve_release_tag.outputs.tag_name != '' }}
        shell: bash
        run: git tag --force "${{ needs.resolve_release_tag.outputs.tag_name }}" HEAD

      - name: Set up Fortran compiler (FC) [all except Windows + gfortran] # except: use pre-installed gfortran
        if: runner.os != 'Windows' || matrix.toolchain.exe != 'gfortran'
        uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - name: Set up NMake build tool [Windows]
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade package installer for Python
        shell: bash
        run: python -m pip install --upgrade pip

      - name: Install Python dependences
        shell: bash
        run: python tools/install_optional_dependencies.py ci test

      - name: Fix reinstalling gcc [macOS]  # needed because of `brew reinstall gcc`
        if: runner.os == 'macOS'
        shell: bash
        run: echo "MACOSX_DEPLOYMENT_TARGET=$(sw_vers -productVersion)" >> $GITHUB_ENV

      - name: Build crysfml wheel with scikit-build-core
        shell: bash
        run: |
          rm -rf "${{ env.WHEEL_DIR }}"
          mkdir -p "${{ env.WHEEL_DIR }}"
          python -m build --wheel --outdir "${{ env.WHEEL_DIR }}"

      - name: Validate wheel filenames for PyPI upload
        shell: bash
        run: python3 tools/validate_pypi_wheel_filenames.py "${{ env.WHEEL_DIR }}"

      #- name: Fix Python package wheel dependencies
      #  if: runner.os == 'macOS'
      #  shell: bash
      #  run: |
      #    pip install delocate
      #    #delocate-wheel -v ${{ env.WHEEL_DIR }}/*.whl

      - name: Test built crysfml wheel
        shell: bash
        run: python tools/run_installed_wheel_tests.py --wheel-dir "${{ env.WHEEL_DIR }}"

      - name: Upload zipped Python package wheel of pyCFML for next job
        uses: actions/upload-artifact@v4
        with:  # if name or path modified, remember to UPDATE those in the download step of the next job
          name: pycfml-wheel_${{ matrix.os }}_${{ matrix.python-version }} # name (without .zip) of the zip file to be uploaded
          path: ${{ env.WHEEL_DIR }}  # all files from this directory are zipped
          if-no-files-found: "error"
          compression-level: 0

  ##############################################################################
  # JOB 2
  ##############################################################################
  test:  # current job name

    needs: [resolve_release_tag, build]  # previous job 'build' need to be finished first

    if: always()  # start this job even if the previous job failed

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, windows-2022, macos-14]
        python-version: ['3.11', '3.12', '3.13', '3.14']
        toolchain:
          - { exe: gfortran, compiler: gcc, version: 13 }

    runs-on: ${{ matrix.os }}

    steps:  # job steps
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history with tags is required for versioningit

      - name: Create local release tag for exact-version wheel tests
        if: ${{ needs.resolve_release_tag.outputs.tag_name != '' }}
        shell: bash
        run: git tag --force "${{ needs.resolve_release_tag.outputs.tag_name }}" HEAD

      - name: Set up python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade package installer for Python
        shell: bash
        run: python3 -m pip install --upgrade pip

      - name: Install Python dependences
        shell: bash
        run: python tools/install_optional_dependencies.py ci test

      - name: Download zipped pyCFML wheel from previous job
        uses: actions/download-artifact@v4
        with:  # name or path are taken from the upload step of the previous job
          name: pycfml-wheel_${{ matrix.os }}_${{ matrix.python-version }}  # name (without .zip) of the zipped artifact uploaded on the previous jobs
          path: ${{ env.WHEEL_DIR }}  # directory to extract downloaded zipped artifacts

      - name: Test downloaded pyCFML wheel
        shell: bash
        run: python tools/run_installed_wheel_tests.py --wheel-dir "${{ env.WHEEL_DIR }}"

  ##############################################################################
  # JOB 3
  ##############################################################################
  source-rebuild:

    needs: resolve_release_tag

    timeout-minutes: 45

    runs-on: ubuntu-24.04

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history with tags is required for versioningit

      - name: Create local release tag for exact-version source rebuild validation
        if: ${{ needs.resolve_release_tag.outputs.tag_name != '' }}
        shell: bash
        run: git tag --force "${{ needs.resolve_release_tag.outputs.tag_name }}" HEAD

      - name: Set up Fortran compiler (FC)
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc
          version: 13

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade package installer for Python
        shell: bash
        run: python -m pip install --upgrade pip

      - name: Install Python dependences
        shell: bash
        run: python tools/install_optional_dependencies.py ci test

      - name: Validate sdist rebuild path
        shell: bash
        run: >
          python tools/validate_sdist_rebuild.py
          --sdist-dir dist/sdist-validation/sdist
          --wheel-dir dist/sdist-validation/wheel

      - name: Upload validated source distribution for release staging
        uses: actions/upload-artifact@v4
        with:
          name: crysfml-sdist
          path: dist/sdist-validation/sdist/*.tar.gz
          if-no-files-found: "error"
          compression-level: 0

  ##############################################################################
  # JOB 4
  ##############################################################################
  upload-release-assets:

    needs: [resolve_release_tag, test, source-rebuild]

    if: ${{ github.event_name == 'push' && github.ref_name == 'master' && needs.resolve_release_tag.outputs.tag_name != '' }}

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup easyscience[bot]
        id: bot
        uses: ./.github/actions/setup-easyscience-bot
        with:
          app-id: ${{ vars.EASYSCIENCE_APP_ID }}
          private-key: ${{ secrets.EASYSCIENCE_APP_KEY }}

      - name: Download built wheels from current workflow run
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pycfml-wheel_*
          merge-multiple: true

      - name: Download validated source distribution from current workflow run
        uses: actions/download-artifact@v4
        with:
          name: crysfml-sdist
          path: release-assets

      - name: Upload validated wheels and source distribution to the GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ needs.resolve_release_tag.outputs.tag_name }}
          files: |
            release-assets/*.whl
            release-assets/*.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ steps.bot.outputs.token }}
