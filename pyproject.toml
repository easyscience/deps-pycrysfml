[project]
name = 'pycrysfml'
dynamic = ['version']
description = 'Python bindings for the CrysFML2008 crystallographic library'
authors = [
  {name = 'Juan Rodríguez-Carvajal', email = 'jrc@ill.fr'},
  {name = 'Javier Gonzalez-Platas', email = 'jplatas@ull.edu.es'},
  {name = 'Nebil Ayape Katcho', email = 'katcho@ill.fr'}
]
maintainers = [
  {name = 'Andrew Sazonov', email = 'andrew.sazonov@ess.eu'},
  {name = 'Elisa Rebolini', email = 'rebolini@ill.fr'},
]
readme = 'README.md'
license = {file = 'LICENSE'}
classifiers = [
  'Development Status :: 4 - Beta',
  'Operating System :: MacOS',
  'Operating System :: Microsoft :: Windows',
  'Operating System :: POSIX :: Linux',
  'Programming Language :: Python :: 3 :: Only',
  'Programming Language :: Python :: 3',
  'Programming Language :: Python :: 3.11',
  'Programming Language :: Python :: 3.12',
  'Programming Language :: Python :: 3.13',
  'Programming Language :: Python :: 3.14',
]
requires-python = '>=3.11,<3.15'
dependencies = [
  'numpy',
]

[project.optional-dependencies]
ci = [
  'toml',  # use this as tomllib is only available for python >=3.11
  'validate-pyproject[all]',
  'build',
  'wheel',
  'check-wheel-contents',
  'abi3audit',
  'colorama'
]
test = [
  'deepdiff',
  'pytest',
  'pytest-benchmark',
  'pygit2',
  'matplotlib'
]

[build-system]
requires = ['hatchling', 'versioningit']
build-backend = 'hatchling.build'

[tool.hatch.version]
source = 'versioningit'

[tool.versioningit.format]
distance = '{base_version}+dev{distance}'
dirty = '{base_version}+dirty{distance}'
distance-dirty = '{base_version}+devdirty{distance}'

[tool.versioningit.vcs]
method = 'git'
match = ['v*']
default-tag = 'v0.0.0'

[tool.hatch.build.targets.wheel]
packages = ['dist/pyCFML/pycrysfml']
artifacts = ['*.py', '*.so', '*.so.*', '*.dylib', '*.pyd', '*.dll', '*.txt']
